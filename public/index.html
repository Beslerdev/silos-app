<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Silos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="/socket.io/socket.io.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f0f2f5;
  margin: 0;
}

h2 {
  margin: 8px 0;
}

/* GRID PC */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 180px);
  gap: 15px;
  justify-content: center;
  margin-top: 10px;
}

/* CONTENEDOR */
.silo-container {
  width: 180px;
}

/* SILO */
svg {
  width: 170px;
  height: 210px;
}

/* TEXTO */
.texto {
  fill: white;
  font-size: 11px;
  font-weight: bold;
  text-anchor: middle;
}

/* CONTROLES */
.controles {
  background: #fff;
  padding: 4px;
  border-radius: 6px;
}

input {
  width: 95%;
  padding: 4px;
  font-size: 12px;
  margin-top: 3px;
}

button {
  width: 95%;
  margin-top: 4px;
  padding: 6px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
}

button:disabled {
  background: #ccc;
}

.ocupar {
  background: #e74c3c;
  color: white;
}

.liberar {
  background: #2ecc71;
  color: white;
}

/* 📱 MODO CELULAR */
@media (max-width: 768px) {

  .grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 10px;
  }

  .silo-container {
    width: 100%;
  }

  svg {
    width: 100%;
    height: 200px;
  }

  .texto {
    font-size: 13px;
  }

  input {
    font-size: 14px;
    padding: 6px;
  }

  button {
    font-size: 14px;
    padding: 8px;
  }

  h2 {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<h2>Estado de Silos</h2>
<div id="grid" class="grid"></div>

<script>
let silos = Array.from({ length: 8 }, () => ({
  estado: "Libre",
  variedad: "",
  kilos: ""
}));

const socket = io();

socket.on("estadoInicial", (data) => {
  silos = data;
  render();
});

socket.on("estadoActualizado", (data) => {
  silos = data;
  render();
});

function color(estado) {
  return estado === "Libre" ? "#2ecc71" : "#e74c3c";
}

function formatearKilos(valor) {
  if (!valor) return "";
  return Number(valor).toLocaleString("es-AR") + " kg";
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  silos.forEach((silo, i) => {
    const ocupado = silo.estado === "Ocupado";

    const div = document.createElement("div");
    div.className = "silo-container";

    div.innerHTML = `
      <svg viewBox="0 0 100 140">
        <rect x="20" y="30" width="60" height="70" fill="${color(silo.estado)}" stroke="black" stroke-width="2"/>
        <polygon points="20,30 50,5 80,30" fill="${color(silo.estado)}" stroke="black" stroke-width="2"/>
        <rect x="25" y="100" width="50" height="25" fill="${color(silo.estado)}" stroke="black" stroke-width="2"/>

        <text x="50" y="50" class="texto">Silo ${i+1}</text>
        <text x="50" y="65" class="texto">${silo.estado}</text>
        <text x="50" y="80" class="texto">${silo.variedad || "-"}</text>
        <text x="50" y="95" class="texto">${formatearKilos(silo.kilos)}</text>
      </svg>

      <div class="controles">
        <input id="var-${i}" placeholder="Variedad..." ${ocupado ? "disabled" : ""} />
        <input id="kg-${i}" type="number" placeholder="Kilos..." ${ocupado ? "disabled" : ""} />

        <button class="ocupar" onclick="ocupar(${i})" ${ocupado ? "disabled" : ""}>
          Ocupar
        </button>

        <button class="liberar" onclick="liberar(${i})">
          Liberar
        </button>
      </div>
    `;

    grid.appendChild(div);
  });
}

function ocupar(i) {
  const variedad = document.getElementById(`var-${i}`).value;
  const kilos = document.getElementById(`kg-${i}`).value;

  if (!variedad || !kilos) {
    alert("Ingresar variedad y kilos");
    return;
  }

  if (silos[i].estado === "Ocupado") {
    alert("El silo ya se encuentra ocupado");
    return;
  }

  actualizar(i, {
    estado: "Ocupado",
    variedad,
    kilos
  });
}

function liberar(i) {
  if (!confirm("¿Seguro que querés liberar el silo?")) return;

  actualizar(i, {
    estado: "Libre",
    variedad: "",
    kilos: ""
  });
}

function actualizar(i, data) {
  silos[i] = data;
  render();
  socket.emit("actualizarSilo", { index: i, data });
}

render();
</script>

</body>
</html>
