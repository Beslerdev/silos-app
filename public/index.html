<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Silos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="/socket.io/socket.io.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f0f2f5;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 180px);
  gap: 15px;
  justify-content: center;
}

/* TABLET */
@media (max-width: 900px) {
  .grid {
    grid-template-columns: repeat(2, 170px);
  }
}

/* CELULAR */
@media (max-width: 500px) {
  .grid {
    grid-template-columns: repeat(2, 45%);
    gap: 10px;
  }

  .controles {
    padding: 8px;
  }

  button, input {
    width: 100%;
    font-size: 14px;
    padding: 6px;
  }

  .info {
    font-size: 14px;
  }
}

/* SILO */
.silo {
  position: relative;
}

.silo img {
  width: 100%;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0.35;
  border-radius: 8px;
}

/* INFO */
.info {
  position: absolute;
  top: 30%;
  width: 100%;
  color: white;
  font-weight: bold;
  text-shadow: 1px 1px 4px black;
}

.titulo {
  margin-bottom: 8px;
  font-size: 16px;
}

.datos {
  font-size: 14px;
}

.obs {
  font-size: 12px;
  margin-top: 5px;
  color: #ffd;
}

/* CONTROLES */
.controles {
  background: white;
  padding: 5px;
  border-radius: 8px;
}

button, input {
  width: 90%;
  margin-top: 4px;
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-box {
  background: white;
  width: 300px;
  margin: 200px auto;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.modal-box button {
  width: 40%;
  margin: 10px;
}
</style>
</head>

<body>

<h2>Estado de Silos</h2>
<div id="grid" class="grid"></div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <p id="modalTexto">¿Vaciar silo?</p>
    <button onclick="confirmarSi()">Sí</button>
    <button onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script>

// SOCKET
const socket = io(window.location.origin);

let silos = [];
let siloSeleccionado = null;

// CAPACIDADES
const capacidades = [
  60000, 60000, 60000, 60000,
  60000, 60000, 60000, 30000
];

// EVENTOS
socket.on("estadoInicial", (data) => {
  silos = data;
  render();
});

socket.on("estadoActualizado", (data) => {
  silos = data;
  render();
});

// COLOR
function color(e) {
  return e === "Libre" ? "green" : "red";
}

// PORCENTAJE
function calcularPorcentaje(kilos, capacidad) {
  if (!capacidad) return 0;
  return Math.round((Number(kilos || 0) / capacidad) * 100);
}

// RENDER
function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  silos.forEach((s, i) => {

    const capacidad = capacidades[i] || 60000;
    const kilosActuales = Number(s.kilos) || 0;
    const porcentaje = calcularPorcentaje(kilosActuales, capacidad);

    const div = document.createElement("div");

    div.innerHTML = `
      <div class="silo">
        <img src="silo.png">
        <div class="overlay" style="background:${color(s.estado)}"></div>

        <div class="info">
          <div class="titulo">Silo ${i+1}</div>

          <div class="datos">
            ${s.variedad || "-"}<br>
            ${kilosActuales.toLocaleString("es-AR")} kg<br>
            ${porcentaje}%
          </div>

          ${s.observacion ? `<div class="obs">${s.observacion}</div>` : ""}
        </div>
      </div>

      <div class="controles">
        <input id="v${i}" placeholder="Variedad"
          value="${s.variedad || ""}"
          ${s.estado==="Ocupado"?"disabled":""}
        >

        <input id="k${i}" type="number" placeholder="Kilos">

        <input id="o${i}" placeholder="Observación"
          value="${s.observacion || ""}"
        >

        <button onclick="cargar(${i})">Cargar</button>
        <button onclick="liberar(${i})">Vaciar</button>
      </div>
    `;

    grid.appendChild(div);
  });
}

// CARGAR
function cargar(i) {
  const v = document.getElementById("v"+i).value.trim();
  const k = Number(document.getElementById("k"+i).value);
  const o = document.getElementById("o"+i).value.trim();

  if (isNaN(k) || k <= 0) {
    return alert("Ingresar kilos válidos");
  }

  const s = silos[i];
  const capacidad = capacidades[i] || 60000;

  const kilosActuales = Number(s.kilos) || 0;
  const total = kilosActuales + k;

  if (total > capacidad) {
    return alert(`Capacidad máxima: ${capacidad.toLocaleString("es-AR")} kg`);
  }

  if (s.estado==="Ocupado" && v && v!==s.variedad) {
    return alert("No se puede cambiar variedad");
  }

  socket.emit("actualizarSilo", {
    index: i,
    data: {
      estado: total === 0 ? "Libre" : "Ocupado",
      variedad: s.variedad || v,
      kilos: total,
      observacion: o
    }
  });
}

// LIBERAR
function liberar(i) {
  siloSeleccionado = i;
  document.getElementById("modalTexto").innerText = `¿Vaciar silo ${i+1}?`;
  document.getElementById("modal").style.display = "block";
}

// VACIADO PARCIAL
function confirmarSi() {
  const input = prompt("¿Cuántos kilos querés retirar?");

  if (input === null) return cerrarModal();

  const retiro = Number(input);

  if (isNaN(retiro) || retiro <= 0) {
    alert("Cantidad inválida");
    return;
  }

  const s = silos[siloSeleccionado];
  const kilosActuales = Number(s.kilos) || 0;

  if (retiro > kilosActuales) {
    return alert("No podés retirar más de lo que hay");
  }

  const nuevoKilos = kilosActuales - retiro;

  socket.emit("actualizarSilo", {
    index: siloSeleccionado,
    data: {
      estado: nuevoKilos === 0 ? "Libre" : "Ocupado",
      variedad: nuevoKilos === 0 ? "" : s.variedad,
      kilos: nuevoKilos,
      observacion: s.observacion || ""
    }
  });

  cerrarModal();
}

// MODAL
function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
