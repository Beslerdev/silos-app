<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Silos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="/socket.io/socket.io.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f0f2f5;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 180px);
  gap: 15px;
  justify-content: center;
}

.silo {
  position: relative;
}

.silo img {
  width: 100%;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  opacity: 0.35;
}

.info {
  position: absolute;
  top: 40%;
  width: 100%;
  color: white;
  font-weight: bold;
}

.controles {
  background: white;
  padding: 5px;
}

button, input {
  width: 90%;
  margin-top: 4px;
}
</style>
</head>

<body>

<h2>Estado de Silos</h2>
<div id="grid" class="grid"></div>

<script>
// 🔥 SOCKET (FIX DEFINITIVO)
const socket = io({
  transports: ["websocket", "polling"]
});

// DEBUG
socket.on("connect", () => console.log("🟢 CONECTADO"));
socket.on("connect_error", (e) => console.log("❌ ERROR", e));

// DATA
let silos = [];

socket.on("estadoInicial", (data) => {
  console.log("📦 inicial", data);
  silos = data;
  render();
});

socket.on("estadoActualizado", (data) => {
  silos = data;
  render();
});

// FUNCIONES
function color(e) {
  return e === "Libre" ? "green" : "red";
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  silos.forEach((s, i) => {
    const div = document.createElement("div");

    div.innerHTML = `
      <div class="silo">
        <img src="silo.png">
        <div class="overlay" style="background:${color(s.estado)}"></div>
        <div class="info">
          Silo ${i+1}<br>
          ${s.variedad || "-"}<br>
          ${s.kilos || 0} kg
        </div>
      </div>

      <div class="controles">
        <input id="v${i}" placeholder="Variedad" ${s.estado==="Ocupado"?"disabled":""}>
        <input id="k${i}" type="number" placeholder="Kilos">

        <button onclick="cargar(${i})">Cargar</button>
        <button onclick="liberar(${i})">Vaciar</button>
      </div>
    `;

    grid.appendChild(div);
  });
}

// ACCIONES
function cargar(i) {
  const v = document.getElementById("v"+i).value;
  const k = Number(document.getElementById("k"+i).value);

  if (!k) return alert("Ingresar kilos");

  const s = silos[i];

  if (s.estado==="Ocupado" && v && v!==s.variedad) {
    return alert("No se puede cambiar variedad");
  }

  socket.emit("actualizarSilo", {
    index: i,
    data: {
      estado: "Ocupado",
      variedad: s.variedad || v,
      kilos: (s.kilos || 0) + k
    }
  });
}

function liberar(i) {
  socket.emit("actualizarSilo", {
    index: i,
    data: {
      estado: "Libre",
      variedad: "",
      kilos: 0
    }
  });
}
</script>

</body>
</html>
