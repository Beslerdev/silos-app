<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Silos</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 150px);
  gap: 15px;
  justify-content: center;
  margin-top: 20px;
}

.silo {
  border: 2px solid #333;
  padding: 20px;
  cursor: pointer;
  border-radius: 10px;
  font-size: 14px;
}

.libre { background: #ccffcc; }
.ocupado { background: #ffcccc; }
</style>
</head>
<body>

<h2>Estado de Silos</h2>
<div id="estadoConexion">Conectando...</div>
<div class="grid" id="grid"></div>

<script>
let silos = Array.from({ length: 8 }, () => ({
  estado: "Libre",
  variedad: ""
}));

const socket = io();

// 🔹 Si conecta bien
socket.on("connect", () => {
  document.getElementById("estadoConexion").innerText = "Conectado";
});

// 🔹 Si falla conexión
socket.on("connect_error", () => {
  document.getElementById("estadoConexion").innerText = "Sin conexión (modo local)";
});

// 🔹 Recibe datos del servidor
socket.on("estadoInicial", (data) => {
  silos = data;
  render();
});

socket.on("estadoActualizado", (data) => {
  silos = data;
  render();
});

// 🔹 Render SIEMPRE (aunque no haya conexión)
function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  silos.forEach((silo, i) => {
    const div = document.createElement("div");
    div.className = "silo " + (silo.estado === "Libre" ? "libre" : "ocupado");

    div.innerHTML = `
      <strong>Silo ${i + 1}</strong><br>
      ${silo.estado}<br>
      ${silo.variedad || ""}
    `;

    div.onclick = () => editar(i);

    grid.appendChild(div);
  });
}

// 🔹 Editar silo
function editar(i) {
  let opcion = prompt("1: Cargar variedad\n2: Marcar libre");

  if (opcion == "1") {
    let variedad = prompt("Variedad:");
    if (variedad) {
      actualizar(i, { estado: "Ocupado", variedad });
    }
  } else if (opcion == "2") {
    actualizar(i, { estado: "Libre", variedad: "" });
  }
}

// 🔹 Enviar cambio
function actualizar(i, data) {
  silos[i] = data;
  render();

  if (socket.connected) {
    socket.emit("actualizarSilo", { index: i, data });
  }
}

// 🔹 Render inicial SIEMPRE
render();
</script>

</body>
</html>
