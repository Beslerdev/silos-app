<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Silos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="/socket.io/socket.io.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f0f2f5;
  margin: 0;
}

h2 {
  margin: 10px 0;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 180px);
  gap: 15px;
  justify-content: center;
}

.silo-container {
  width: 180px;
}

.silo-visual {
  position: relative;
}

.silo-img {
  width: 100%;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0.35;
  pointer-events: none;
}

.info {
  position: absolute;
  top: 40%;
  width: 100%;
  color: white;
  font-weight: bold;
  text-shadow: 1px 1px 4px black;
}

.controles {
  background: #fff;
  padding: 5px;
  border-radius: 6px;
  margin-top: 5px;
}

input, button {
  width: 95%;
  margin-top: 4px;
  padding: 6px;
}

button {
  cursor: pointer;
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<h2>Estado de Silos</h2>
<div id="grid" class="grid"></div>

<script>
let silos = [];

// 🔥 CONEXIÓN CORREGIDA PARA RENDER
const socket = io(window.location.origin, {
  transports: ["websocket"]
});

// DEBUG
socket.on("connect", () => {
  console.log("🟢 Conectado al servidor");
});

socket.on("connect_error", (err) => {
  console.log("❌ Error conexión:", err);
});

// DATOS
socket.on("estadoInicial", (data) => {
  console.log("📦 Estado inicial:", data);
  silos = data;
  render();
});

socket.on("estadoActualizado", (data) => {
  console.log("🔄 Estado actualizado:", data);
  silos = data;
  render();
});

// FUNCIONES
function color(estado) {
  return estado === "Libre" ? "green" : "red";
}

function formatearKilos(valor) {
  return valor ? Number(valor).toLocaleString("es-AR") + " kg" : "";
}

// RENDER
function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  silos.forEach((silo, i) => {
    const div = document.createElement("div");
    div.className = "silo-container";

    div.innerHTML = `
      <div class="silo-visual">
        <img src="silo.png" class="silo-img"/>
        <div class="overlay" style="background-color:${color(silo.estado)}"></div>

        <div class="info">
          Silo ${i+1}<br>
          ${silo.variedad || "-"}<br>
          ${formatearKilos(silo.kilos)}
        </div>
      </div>

      <div class="controles">
        <input id="var-${i}" 
          placeholder="Variedad..." 
          value="${silo.variedad || ""}"
          ${silo.estado === "Ocupado" ? "disabled" : ""}
        />

        <input id="kg-${i}" type="number" placeholder="Kilos..." />

        <button onclick="cargar(${i})">Cargar</button>
        <button onclick="liberar(${i})">Vaciar</button>
      </div>
    `;

    grid.appendChild(div);
  });
}

// CARGAR
function cargar(i) {
  const variedadInput = document.getElementById(`var-${i}`).value.trim();
  const kilos = Number(document.getElementById(`kg-${i}`).value);

  if (!kilos) {
    alert("Ingresar kilos");
    return;
  }

  const siloActual = silos[i];

  // BLOQUEO DE VARIEDAD
  if (siloActual.estado === "Ocupado") {
    if (variedadInput && variedadInput !== siloActual.variedad) {
      alert("⚠️ No se puede cambiar la variedad. Primero vaciá el silo.");
      return;
    }
  }

  const nuevaVariedad = siloActual.variedad || variedadInput || "Sin especificar";

  const nuevoSilo = {
    estado: "Ocupado",
    variedad: nuevaVariedad,
    kilos: (siloActual.kilos || 0) + kilos
  };

  socket.emit("actualizarSilo", {
    index: i,
    data: nuevoSilo
  });
}

// LIBERAR
function liberar(i) {
  if (!confirm("¿Vaciar silo?")) return;

  socket.emit("actualizarSilo", {
    index: i,
    data: {
      estado: "Libre",
      variedad: "",
      kilos: 0
    }
  });
}
</script>

</body>
</html>
