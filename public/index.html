<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Silos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="/socket.io/socket.io.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f0f2f5;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 180px);
  gap: 15px;
  justify-content: center;
}

/* TABLET */
@media (max-width: 900px) {
  .grid {
    grid-template-columns: repeat(2, 170px);
  }
}

/* CELULAR */
@media (max-width: 500px) {
  .grid {
    grid-template-columns: repeat(2, 45%);
    gap: 10px;
  }

  .controles {
    padding: 8px;
  }

  button, input {
    width: 100%;
    font-size: 14px;
    padding: 6px;
  }

  .info {
    font-size: 14px;
  }
}

/* SILO */
.silo {
  position: relative;
}

.silo img {
  width: 100%;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0.35;
  border-radius: 8px;
}

.info {
  position: absolute;
  top: 35%; /* 🔥 un poco más arriba */
  width: 100%;
  color: white;
  font-weight: bold;
  text-shadow: 1px 1px 4px black;
}

/* CONTROLES */
.controles {
  background: white;
  padding: 5px;
  border-radius: 8px;
}

button, input {
  width: 90%;
  margin-top: 4px;
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-box {
  background: white;
  width: 300px;
  margin: 200px auto;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.modal-box button {
  width: 40%;
  margin: 10px;
}
</style>
</head>

<body>

<h2>Estado de Silos</h2>
<div id="grid" class="grid"></div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <p id="modalTexto">¿Vaciar silo?</p>
    <button onclick="confirmarSi()">Sí</button>
    <button onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script>

// SOCKET
const socket = io(window.location.origin);

let silos = [];
let siloSeleccionado = null;

// EVENTOS
socket.on("estadoInicial", (data) => {
  silos = data;
  render();
});

socket.on("estadoActualizado", (data) => {
  silos = data;
  render();
});

// COLOR
function color(e) {
  return e === "Libre" ? "green" : "red";
}

// RENDER
function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  silos.forEach((s, i) => {
    const div = document.createElement("div");

    div.innerHTML = `
      <div class="silo">
        <img src="silo.png">
        <div class="overlay" style="background:${color(s.estado)}"></div>

        <div class="info">
          Silo ${i+1}<br>
          ${s.variedad || "-"}<br>
          ${Number(s.kilos || 0).toLocaleString("es-AR")} kg
        </div>
      </div>

      <div class="controles">
        <input id="v${i}" placeholder="Variedad"
          value="${s.variedad || ""}"
          ${s.estado==="Ocupado"?"disabled":""}
        >

        <input id="k${i}" type="number" placeholder="Kilos">

        <button onclick="cargar(${i})">Cargar</button>
        <button onclick="liberar(${i})">Vaciar</button>
      </div>
    `;

    grid.appendChild(div);
  });
}

// CARGAR
function cargar(i) {
  const v = document.getElementById("v"+i).value.trim();
  const k = Number(document.getElementById("k"+i).value);

  if (!k) return alert("Ingresar kilos");

  const s = silos[i];

  if (s.estado==="Ocupado" && v && v!==s.variedad) {
    return alert("No se puede cambiar variedad");
  }

  socket.emit("actualizarSilo", {
    index: i,
    data: {
      estado: "Ocupado",
      variedad: s.variedad || v,
      kilos: (s.kilos || 0) + k
    }
  });
}

// LIBERAR (usa modal)
function liberar(i) {
  siloSeleccionado = i;
  document.getElementById("modalTexto").innerText = `¿Vaciar silo ${i+1}?`;
  document.getElementById("modal").style.display = "block";
}

// MODAL
function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

function confirmarSi() {
  socket.emit("actualizarSilo", {
    index: siloSeleccionado,
    data: {
      estado: "Libre",
      variedad: "",
      kilos: 0
    }
  });

  cerrarModal();
}

</script>

</body>
</html>
